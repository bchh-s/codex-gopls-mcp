name: Bug report
description: Report a reproducible bug or platform compatibility problem
title: "[bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug and the expected behavior.
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Linux
        - Windows native
        - WSL
        - Other
    validations:
      required: true
  - type: input
    id: os_version
    attributes:
      label: OS version
      placeholder: e.g. macOS 15.4, Ubuntu 24.04, Windows 11 24H2
    validations:
      required: true
  - type: input
    id: shell
    attributes:
      label: Shell
      placeholder: e.g. zsh, bash, PowerShell, cmd
    validations:
      required: true
  - type: input
    id: node_version
    attributes:
      label: Node.js version
      placeholder: e.g. v22.14.0
    validations:
      required: true
  - type: input
    id: go_version
    attributes:
      label: Go version
      placeholder: e.g. go1.24.1
    validations:
      required: true
  - type: input
    id: gopls_version
    attributes:
      label: gopls version
      placeholder: e.g. golang.org/x/tools/gopls v0.21.1
    validations:
      required: true
  - type: dropdown
    id: gvm
    attributes:
      label: Are you using GVM?
      options:
        - "yes"
        - "no"
        - not sure
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste the smallest useful output.
