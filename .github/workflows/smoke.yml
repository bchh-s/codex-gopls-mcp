name: smoke

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.0"

      - name: Install gopls
        shell: bash
        run: |
          go install golang.org/x/tools/gopls@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Check server syntax
        run: node --check server.js

      - name: Run smoke test
        run: node scripts/ci/smoke-test.mjs
